<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELEGANCE CYBER - AETHER SYMPHONY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020205;
            --main-white: #e5e5e5;
            --accent-blue: #a5b4fc;
        }
        body {
            background-color: var(--bg-color);
            color: var(--main-white);
            font-family: 'Shippori Mincho', serif;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #three-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        #boot-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 2s ease;
        }
        .boot-text {
            font-family: 'Cinzel', serif;
            letter-spacing: 1em;
            font-size: 10px;
            color: var(--accent-blue);
            animation: pulse 1.5s infinite;
        }
        .boot-bar {
            width: 150px;
            height: 1px;
            background: rgba(165, 180, 252, 0.2);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .boot-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-blue);
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .overlay-fx {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, transparent 10%, rgba(2,2,5,0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .ornamental-frame {
            position: absolute;
            inset: 15px;
            border: 0.5px solid rgba(165, 180, 252, 0.1);
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease 1s;
        }
        .ornamental-corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 0.5px solid var(--accent-blue);
            opacity: 0.4;
        }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 30px 0 0 0; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 30px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 30px; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 30px 0; }

        .ui-panel {
            position: absolute;
            bottom: -100%;
            width: 100%;
            background: linear-gradient(to top, rgba(2,2,5,0.98) 70%, transparent 100%);
            padding: 50px 30px 60px;
            z-index: 10;
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(165, 180, 252, 0.05);
            transition: bottom 1.5s cubic-bezier(0.19, 1, 0.22, 1) 1.5s;
        }

        .btn-command {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(165, 180, 252, 0.15);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.3em;
            font-size: 10px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            color: #777;
            position: relative;
            text-transform: uppercase;
            overflow: hidden;
        }
        .btn-command:hover {
            border-color: var(--accent-blue);
            color: #fff;
            background: rgba(165, 180, 252, 0.05);
            box-shadow: 0 0 15px rgba(165, 180, 252, 0.1);
            transform: translateY(-2px);
        }

        .sync-val {
            font-family: 'Cinzel', serif;
            font-weight: 200;
            letter-spacing: -0.05em;
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(165, 180, 252, 0.4);
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 3px;
            z-index: 6;
            pointer-events: none;
            opacity: 0.5;
        }

        .effect-pop {
            position: absolute;
            pointer-events: none;
            font-family: 'Cinzel', serif;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-blue);
            font-size: 40px;
            font-weight: 100;
            z-index: 100;
            animation: riseFade 1.4s ease-out forwards;
        }
        @keyframes riseFade {
            0% { opacity: 0; transform: translate(-50%, 20px); letter-spacing: -0.2em; filter: blur(10px); }
            30% { opacity: 1; transform: translate(-50%, 0); letter-spacing: 0.3em; filter: blur(0px); }
            100% { opacity: 0; transform: translate(-50%, -100px); letter-spacing: 0.6em; }
        }
    </style>
</head>
<body>

    <div id="boot-overlay">
        <div class="boot-text">AETHER SYMPHONY BOOTING...</div>
        <div class="boot-bar"></div>
    </div>

    <div id="three-container"></div>
    <div class="overlay-fx"></div>
    <div class="scanlines"></div>
    
    <div id="main-frame" class="ornamental-frame">
        <div class="ornamental-corner top-left"></div>
        <div class="ornamental-corner top-right"></div>
        <div class="ornamental-corner bottom-left"></div>
        <div class="ornamental-corner bottom-right"></div>
    </div>

    <div id="main-ui" class="ui-panel">
        <div class="status-header flex justify-between items-end mb-8">
            <div>
                <span class="text-[8px] tracking-[0.7em] text-neutral-600 uppercase font-bold">Synchronicity Unit // Iris-00</span>
                <p id="sub-text" class="text-[12px] italic text-neutral-400 mt-3 tracking-[0.2em] opacity-0 transition-all duration-1000 transform translate-y-2">「鏡の中に、蒼い雨が降っているの」</p>
            </div>
            <div class="text-right">
                <span class="text-[8px] tracking-[0.4em] text-neutral-600 uppercase font-bold">Resonance Rate</span>
                <p id="sync-val" class="sync-val text-5xl mt-1">0.0<span class="text-[14px] ml-1">％</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
            <button onclick="triggerEffect('resonate')" class="btn-command py-5">RESONATE / 共鳴</button>
            <button onclick="triggerEffect('glitch')" class="btn-command py-5">GLITCH / 攪乱</button>
            <button onclick="triggerEffect('trace')" class="btn-command py-5">TRACE / 追憶</button>
            <button onclick="triggerEffect('void')" class="btn-command py-5">VOID / 虚無</button>
        </div>

        <div class="mt-10 flex justify-between text-[7px] text-neutral-700 tracking-[0.4em] uppercase font-bold border-t border-neutral-900 pt-6">
            <div class="flex gap-4">
                <span>Subject: IMG_2557.jpg</span>
                <span class="text-neutral-800">|</span>
                <span>Status: Operational</span>
            </div>
            <span>Logic Engine: AETHER-SYMPHONY.v3.2</span>
        </div>
    </div>

    <div id="effect-layer" class="absolute inset-0 pointer-events-none z-50"></div>

    <script>
        let scene, camera, renderer, characterPlane, rainParticles, dustParticles;
        const container = document.getElementById('three-container');

        // GitHubリポジトリ内の画像ファイル名。
        // 同じ階層に置く場合は 'IMG_2557.jpg' だけでOKです。
        const CHARACTER_IMAGE_URL = 'IMG_2557.jpg';

        window.onload = function() {
            initThree();
            startSequence();
        }

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            
            // エラーハンドリングを追加
            loader.load(
                CHARACTER_IMAGE_URL, 
                (texture) => {
                    console.log("Character image loaded successfully.");
                    const geometry = new THREE.PlaneGeometry(3.2, 3.2);
                    const material = new THREE.MeshBasicMaterial({ 
                        map: texture, 
                        transparent: true,
                        opacity: 0 
                    });
                    characterPlane = new THREE.Mesh(geometry, material);
                    characterPlane.position.y = 0.4;
                    scene.add(characterPlane);
                },
                undefined,
                (err) => {
                    console.error("Failed to load image at: " + CHARACTER_IMAGE_URL);
                    // 代わりの赤い板を表示（デバッグ用）
                    const geometry = new THREE.PlaneGeometry(3, 3);
                    const material = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, transparent: true, opacity: 0.5 });
                    characterPlane = new THREE.Mesh(geometry, material);
                    characterPlane.position.y = 0.4;
                    scene.add(characterPlane);
                }
            );

            // 雨
            const rainCount = 800;
            const rainGeometry = new THREE.BufferGeometry();
            const rainPositions = new Float32Array(rainCount * 3);
            const rainVelocities = new Float32Array(rainCount);
            for(let i = 0; i < rainCount; i++) {
                rainPositions[i * 3] = (Math.random() - 0.5) * 15;
                rainPositions[i * 3 + 1] = Math.random() * 15;
                rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 5;
                rainVelocities[i] = 0.08 + Math.random() * 0.15;
            }
            rainGeometry.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
            const rainMaterial = new THREE.PointsMaterial({
                color: 0xa5b4fc, size: 0.015, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
            });
            rainParticles = new THREE.Points(rainGeometry, rainMaterial);
            scene.add(rainParticles);
            rainParticles.userData.velocities = rainVelocities;

            // 塵
            const dustCount = 150;
            const dustGeometry = new THREE.BufferGeometry();
            const dustPositions = new Float32Array(dustCount * 3);
            for(let i = 0; i < dustCount; i++) {
                dustPositions[i * 3] = (Math.random() - 0.5) * 20;
                dustPositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
                dustPositions[i * 3 + 2] = -5 - Math.random() * 5;
            }
            dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
            const dustMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.1 });
            dustParticles = new THREE.Points(dustGeometry, dustMaterial);
            scene.add(dustParticles);

            window.addEventListener('mousemove', (e) => {
                if (characterPlane) {
                    const x = (e.clientX / window.innerWidth - 0.5) * 0.25;
                    const y = (e.clientY / window.innerHeight - 0.5) * 0.2;
                    characterPlane.rotation.y = x;
                    characterPlane.rotation.x = y;
                }
            });
            animate();
        }

        async function startSequence() {
            await new Promise(r => setTimeout(r, 2000));
            document.getElementById('boot-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('boot-overlay').remove(), 2000);

            let op = 0;
            const fadeIn = setInterval(() => {
                if (characterPlane) {
                    op += 0.015;
                    characterPlane.material.opacity = op;
                    if (op >= 0.95) clearInterval(fadeIn);
                }
            }, 30);

            document.getElementById('main-ui').style.bottom = '0';
            document.getElementById('main-frame').style.opacity = '1';

            let sync = 0;
            const targetSync = 94.2;
            const counter = setInterval(() => {
                sync += 1.2;
                if (sync >= targetSync) {
                    sync = targetSync;
                    clearInterval(counter);
                    const sub = document.getElementById('sub-text');
                    sub.style.opacity = '1';
                    sub.style.transform = 'translateY(0)';
                }
                document.getElementById('sync-val').innerHTML = sync.toFixed(1) + '<span class="text-[14px] ml-1">％</span>';
            }, 30);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if (characterPlane) characterPlane.position.y = 0.4 + Math.sin(time * 0.8) * 0.025;
            if (rainParticles) {
                const pos = rainParticles.geometry.attributes.position.array;
                const vels = rainParticles.userData.velocities;
                for(let i = 0; i < pos.length / 3; i++) {
                    pos[i * 3 + 1] -= vels[i];
                    if (pos[i * 3 + 1] < -6) pos[i * 3 + 1] = 8;
                }
                rainParticles.geometry.attributes.position.needsUpdate = true;
            }
            if (dustParticles) {
                dustParticles.rotation.y = time * 0.02;
                dustParticles.rotation.z = time * 0.01;
            }
            renderer.render(scene, camera);
        }

        function triggerEffect(type) {
            const effectLayer = document.getElementById('effect-layer');
            const pop = document.createElement('div');
            pop.className = 'effect-pop';
            pop.style.left = '50%';
            pop.style.top = '45%';
            const sub = document.getElementById('sub-text');
            const originalText = sub.innerText;

            if (type === 'resonate') {
                pop.textContent = "RESONANCE";
                sub.innerText = ">> SYNC RATE STABILIZING...";
                if (characterPlane) {
                    characterPlane.scale.set(1.03, 1.03, 1.03);
                    setTimeout(() => characterPlane.scale.set(1, 1, 1), 300);
                }
            } else if (type === 'glitch') {
                pop.textContent = "GLITCH";
                sub.innerText = ">> WARNING: DATA CORRUPTION";
                container.style.filter = 'contrast(3) brightness(1.5) hue-rotate(120deg) saturate(0)';
                setTimeout(() => container.style.filter = '', 150);
            } else if (type === 'trace') {
                pop.textContent = "TRACE";
                sub.innerText = ">> ACCESSING MEMORY SECTOR...";
            } else if (type === 'void') {
                pop.textContent = "VOID";
                sub.innerText = ">> ENTERING DARK SECTOR";
                if (characterPlane) characterPlane.material.opacity = 0.05;
                setTimeout(() => characterPlane.material.opacity = 0.95, 800);
            }
            effectLayer.appendChild(pop);
            setTimeout(() => { pop.remove(); sub.innerText = originalText; }, 1400);
        }
    </script>
</body>
</html>
